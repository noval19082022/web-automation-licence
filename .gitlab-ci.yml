stages:
  - pr_agent

pr_agent_job:
  stage: pr_agent
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker info
    - echo "Running PR Agent action step"
    - export MR_URL="$CI_MERGE_REQUEST_PROJECT_URL/merge_requests/$CI_MERGE_REQUEST_IID"
    - echo "MR_URL=$MR_URL"
  script:
    - docker run --rm -e OPENAI.KEY=$OPENAI_KEY -e OPENAI.API_TYPE=azure -e OPENAI.API_VERSION=2023-03-15-preview -e OPENAI.API_BASE=$OPENAI_API_BASE -e OPENAI.DEPLOYMENT_ID=$OPENAI_DEPLOYMENT_ID -e CONFIG.MODEL=$OPENAI_MODEL -e CONFIG.GIT_PROVIDER=gitlab -e GITLAB.PERSONAL_ACCESS_TOKEN=$GITLAB_PERSONAL_ACCESS_TOKEN -e GITLAB.URL=https://langit.kerupux.com:3009 codiumai/pr-agent:latest --pr_url "$MR_URL" describe
    - docker run --rm -e OPENAI.KEY=$OPENAI_KEY -e OPENAI.API_TYPE=azure -e OPENAI.API_VERSION=2023-03-15-preview -e OPENAI.API_BASE=$OPENAI_API_BASE -e OPENAI.DEPLOYMENT_ID=$OPENAI_DEPLOYMENT_ID -e CONFIG.MODEL=$OPENAI_MODEL -e CONFIG.GIT_PROVIDER=gitlab -e GITLAB.PERSONAL_ACCESS_TOKEN=$GITLAB_PERSONAL_ACCESS_TOKEN -e GITLAB.URL=https://langit.kerupux.com:3009 codiumai/pr-agent:latest --pr_url "$MR_URL" review
    - docker run --rm -e OPENAI.KEY=$OPENAI_KEY -e OPENAI.API_TYPE=azure -e OPENAI.API_VERSION=2023-03-15-preview -e OPENAI.API_BASE=$OPENAI_API_BASE -e OPENAI.DEPLOYMENT_ID=$OPENAI_DEPLOYMENT_ID -e CONFIG.MODEL=$OPENAI_MODEL -e CONFIG.GIT_PROVIDER=gitlab -e GITLAB.PERSONAL_ACCESS_TOKEN=$GITLAB_PERSONAL_ACCESS_TOKEN -e GITLAB.URL=https://langit.kerupux.com:3009 codiumai/pr-agent:latest --pr_url "$MR_URL" improve
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && (($CI_COMMIT_REF_NAME == "develop" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main") || ($CI_COMMIT_REF_NAME == "main" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop"))'
      when: never
    - if: '$CI_COMMIT_REF_NAME == "develop" || $CI_COMMIT_REF_NAME == "main"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
  allow_failure: true
